<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Conversation · Blinder</title>
<style>
/* =============================================================
   Blinder Design System — Tokens
   Warm Dusk palette · Lato type · 8pt spacing · anti-urgency motion
   ============================================================= */

@import url("https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap");

:root {
  /* ----- Colour · Warm Dusk -------------------------------- */
  --bg-base:       #FBF5EE;
  --bg-surface:    #EDE3D8;
  --bg-elevated:   #F5EDE2;
  --bg-dark:       #2C1C1A;

  --primary:       #8B4E6E;
  --primary-light: #B87A98;
  --reveal:        #D4A85A;  /* reserved for reveal ceremony only */
  --accent:        #C4825A;

  --text-primary:   #2C1C1A;
  --text-secondary: #7A5A52;
  --text-muted:     #A08878;

  --border:  #DDD0C4;
  --error:   #B85050;
  --offline: #9A9090;

  /* Semantic pairings */
  --on-primary:  #FFFFFF;
  --on-reveal:   #2C1C1A;
  --on-dark:     #F6EEE5;

  /* ----- Type · Lato --------------------------------------- */
  --font-sans: "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --fw-light:   300;
  --fw-regular: 400;
  --fw-bold:    700;
  --fw-black:   900;

  --text-display-size: 32px; --text-display-lh: 1.2;  --text-display-weight: 900;
  --text-h1-size:      24px; --text-h1-lh:      1.3;  --text-h1-weight:      700;
  --text-h2-size:      20px; --text-h2-lh:      1.35; --text-h2-weight:      700;
  --text-h3-size:      17px; --text-h3-lh:      1.4;  --text-h3-weight:      700;
  --text-body-size:    15px; --text-body-lh:    1.65; --text-body-weight:    400;
  --text-body-sm-size: 13px; --text-body-sm-lh: 1.6;  --text-body-sm-weight: 400;
  --text-caption-size: 11px; --text-caption-lh: 1.5;  --text-caption-weight: 300;
  --text-button-size:  14px; --text-button-lh:  1;    --text-button-weight:  700;

  --tracking-default: 0;
  --tracking-button:  0.04em;

  /* ----- Spacing · 8pt grid -------------------------------- */
  --space-xs:  4px;
  --space-sm:  8px;
  --space-md:  16px;
  --space-lg:  24px;
  --space-xl:  32px;
  --space-2xl: 48px;

  /* Per UX spec: 16px screen horizontal padding token, but layout
     preview gets 24px breathing room to feel appropriate on-screen. */
  --screen-padding: 16px;

  /* ----- Radius ------------------------------------------- */
  --radius-sm:   8px;
  --radius-md:   14px;
  --radius-lg:   18px;
  --radius-xl:   20px;
  --radius-full: 9999px;

  /* ----- Elevation (minimal) ------------------------------ */
  --shadow-cta:    0 8px 20px rgba(44, 28, 26, 0.14);
  --shadow-modal:  0 12px 32px rgba(44, 28, 26, 0.22);
  --shadow-reveal:
    0 0 0 12px rgba(212, 168, 90, 0.22),
    0 0 0 26px rgba(212, 168, 90, 0.12);

  /* ----- Motion ------------------------------------------- */
  --dur-instant:   80ms;
  --dur-quick:     150ms;
  --dur-standard:  220ms;
  --dur-gate:      420ms;
  --dur-reveal:    1600ms;

  --ease-standard:  cubic-bezier(.2, 0, 0, 1);
  --ease-emphasize: cubic-bezier(.16, 1, .3, 1);   /* gate, reveal entrance */
  --ease-out:       cubic-bezier(.33, 1, .68, 1);
}

/* ----- Utility classes for the kit & preview --------------- */
.font-sans      { font-family: var(--font-sans); }

.text-display   { font: var(--text-display-weight) var(--text-display-size)/var(--text-display-lh) var(--font-sans); }
.text-h1        { font: var(--text-h1-weight)      var(--text-h1-size)/var(--text-h1-lh)           var(--font-sans); }
.text-h2        { font: var(--text-h2-weight)      var(--text-h2-size)/var(--text-h2-lh)           var(--font-sans); }
.text-h3        { font: var(--text-h3-weight)      var(--text-h3-size)/var(--text-h3-lh)           var(--font-sans); }
.text-body      { font: var(--text-body-weight)    var(--text-body-size)/var(--text-body-lh)       var(--font-sans); }
.text-body-sm   { font: var(--text-body-sm-weight) var(--text-body-sm-size)/var(--text-body-sm-lh) var(--font-sans); }
.text-caption   { font: var(--text-caption-weight) var(--text-caption-size)/var(--text-caption-lh) var(--font-sans); letter-spacing: var(--tracking-button); }
.text-button    { font: var(--text-button-weight)  var(--text-button-size)/var(--text-button-lh)   var(--font-sans); letter-spacing: var(--tracking-button); }

@media (prefers-reduced-motion: reduce) {
  :root {
    --dur-gate:   200ms;
    --dur-reveal: 200ms;
  }
}

</style>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans)}
  .wrap{padding:32px 40px;max-width:820px}
  h1{margin:0 0 4px;font-size:22px;font-weight:900;letter-spacing:-0.01em}
  .sub{margin:0 0 28px;color:var(--text-secondary);font-size:13px;line-height:1.55;max-width:560px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:18px;padding:18px}
  .label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
  .stack{display:grid;gap:10px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Conversation surfaces</h1>
  <p class="sub">Bubbles are the product. Me uses <code>--primary</code>, them uses <code>--bg-surface</code>. Avatars during the blind phase are warm gradients, never silhouettes.</p>
  <div class="two">
    <div class="card" id="bubbles">
      <div class="label">Bubbles</div>
      <div class="stack" id="bubbles-mount"></div>
    </div>
    <div class="card" id="avatars">
      <div class="label">Blind avatars</div>
      <div id="avatars-mount" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;padding:8px 0 4px"></div>
      <p style="color:var(--text-secondary);font-size:12px;line-height:1.55;margin:16px 0 0">
        Size <b>sm</b> 40 · <b>md</b> 64 · <b>lg</b> 112. Seeded hues keep each match visually distinct within the palette.
      </p>
    </div>
  </div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
// ConversationBubble — message display unit. Receding chrome, conversation-first.
// Variants: them (left, surface) · me (right, primary)
// States: sent · sending (optimistic, slightly faded) · failed (error underline)

const bubbleBase = {
  maxWidth: "78%",
  padding: "10px 14px",
  fontFamily: "var(--font-sans)",
  fontSize: "var(--text-body-size)",
  lineHeight: "var(--text-body-lh)",
  borderRadius: "var(--radius-lg)",
  wordBreak: "break-word",
};

const ConversationBubble = ({
  children,
  variant = "them",           // them | me
  state = "sent",             // sent | sending | failed
  timestamp,
  style,
}) => {
  const isMe = variant === "me";
  return (
    <div
      style={{
        display: "flex",
        flexDirection: "column",
        alignItems: isMe ? "flex-end" : "flex-start",
        gap: 2,
        ...style,
      }}
    >
      <div
        style={{
          ...bubbleBase,
          background: isMe ? "var(--primary)" : "var(--bg-surface)",
          color: isMe ? "var(--on-primary)" : "var(--text-primary)",
          borderBottomLeftRadius: isMe ? "var(--radius-lg)" : 6,
          borderBottomRightRadius: isMe ? 6 : "var(--radius-lg)",
          opacity: state === "sending" ? 0.62 : 1,
          textDecoration: state === "failed" ? "underline wavy var(--error)" : "none",
          transition: "opacity var(--dur-standard) var(--ease-out)",
        }}
      >
        {children}
      </div>
      {timestamp && (
        <span
          className="text-caption"
          style={{
            color: state === "failed" ? "var(--error)" : "var(--text-muted)",
            padding: "0 6px",
          }}
        >
          {state === "failed" ? "Didn't send — tap to retry" : timestamp}
        </span>
      )}
    </div>
  );
};

window.ConversationBubble = ConversationBubble;

// BlindAvatar — warm, dignified placeholder during blind phase.
// NOT a silhouette, NOT a broken-image. A soft radial gradient shape with
// a subtle inner glow, anchored by a neutral glyph.
// Variants: sm (header), md (reply), lg (match entry / reveal wait).

const BlindAvatar = ({ size = "md", seed = 3, style }) => {
  const px = size === "sm" ? 40 : size === "lg" ? 112 : 64;

  // Seeded hue shift keeps each blind avatar visually unique within the palette.
  const hues = [
    ["#E8B994", "#C4825A"],
    ["#D9A6B8", "#8B4E6E"],
    ["#E4C28A", "#C4825A"],
    ["#C8A68C", "#8B4E6E"],
  ];
  const [a, b] = hues[seed % hues.length];

  return (
    <div
      role="img"
      aria-label="Your conversation partner — identity revealed after the decision gate"
      style={{
        width: px,
        height: px,
        borderRadius: "50%",
        background: `radial-gradient(circle at 30% 30%, ${a} 0%, ${b} 62%, #6b3a54 100%)`,
        display: "grid",
        placeItems: "center",
        position: "relative",
        flexShrink: 0,
        ...style,
      }}
    >
      {/* Inner dignity glyph — two concentric soft arcs */}
      <svg
        width={px * 0.5}
        height={px * 0.5}
        viewBox="0 0 40 40"
        fill="none"
        style={{ opacity: 0.55 }}
        aria-hidden="true"
      >
        <circle cx="20" cy="20" r="14" stroke="#FBF5EE" strokeWidth="1.2" opacity="0.55" />
        <path d="M8 24 Q20 14 32 24" stroke="#FBF5EE" strokeWidth="1.4" strokeLinecap="round" />
      </svg>
    </div>
  );
};

window.BlindAvatar = BlindAvatar;


// --- page ---

ReactDOM.createRoot(document.getElementById("bubbles-mount")).render(
  <>
    <ConversationBubble variant="them" timestamp="20:13">What was the first thing you ruined when you started cooking?</ConversationBubble>
    <ConversationBubble variant="me" timestamp="20:14">Risotto. I learned what "al dente" means the hard way.</ConversationBubble>
    <ConversationBubble variant="me" state="sending" timestamp="sending…">You?</ConversationBubble>
    <ConversationBubble variant="me" state="failed" timestamp="20:15">Failed message</ConversationBubble>
  </>
);
ReactDOM.createRoot(document.getElementById("avatars-mount")).render(
  <>
    <BlindAvatar size="sm" seed={0} />
    <BlindAvatar size="md" seed={1} />
    <BlindAvatar size="md" seed={2} />
    <BlindAvatar size="lg" seed={3} />
  </>
);
</script>
</body>
</html>
