<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buttons · Blinder</title>
<style>
/* =============================================================
   Blinder Design System — Tokens
   Warm Dusk palette · Lato type · 8pt spacing · anti-urgency motion
   ============================================================= */

@import url("https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap");

:root {
  /* ----- Colour · Warm Dusk -------------------------------- */
  --bg-base:       #FBF5EE;
  --bg-surface:    #EDE3D8;
  --bg-elevated:   #F5EDE2;
  --bg-dark:       #2C1C1A;

  --primary:       #8B4E6E;
  --primary-light: #B87A98;
  --reveal:        #D4A85A;  /* reserved for reveal ceremony only */
  --accent:        #C4825A;

  --text-primary:   #2C1C1A;
  --text-secondary: #7A5A52;
  --text-muted:     #A08878;

  --border:  #DDD0C4;
  --error:   #B85050;
  --offline: #9A9090;

  /* Semantic pairings */
  --on-primary:  #FFFFFF;
  --on-reveal:   #2C1C1A;
  --on-dark:     #F6EEE5;

  /* ----- Type · Lato --------------------------------------- */
  --font-sans: "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --fw-light:   300;
  --fw-regular: 400;
  --fw-bold:    700;
  --fw-black:   900;

  --text-display-size: 32px; --text-display-lh: 1.2;  --text-display-weight: 900;
  --text-h1-size:      24px; --text-h1-lh:      1.3;  --text-h1-weight:      700;
  --text-h2-size:      20px; --text-h2-lh:      1.35; --text-h2-weight:      700;
  --text-h3-size:      17px; --text-h3-lh:      1.4;  --text-h3-weight:      700;
  --text-body-size:    15px; --text-body-lh:    1.65; --text-body-weight:    400;
  --text-body-sm-size: 13px; --text-body-sm-lh: 1.6;  --text-body-sm-weight: 400;
  --text-caption-size: 11px; --text-caption-lh: 1.5;  --text-caption-weight: 300;
  --text-button-size:  14px; --text-button-lh:  1;    --text-button-weight:  700;

  --tracking-default: 0;
  --tracking-button:  0.04em;

  /* ----- Spacing · 8pt grid -------------------------------- */
  --space-xs:  4px;
  --space-sm:  8px;
  --space-md:  16px;
  --space-lg:  24px;
  --space-xl:  32px;
  --space-2xl: 48px;

  /* Per UX spec: 16px screen horizontal padding token, but layout
     preview gets 24px breathing room to feel appropriate on-screen. */
  --screen-padding: 16px;

  /* ----- Radius ------------------------------------------- */
  --radius-sm:   8px;
  --radius-md:   14px;
  --radius-lg:   18px;
  --radius-xl:   20px;
  --radius-full: 9999px;

  /* ----- Elevation (minimal) ------------------------------ */
  --shadow-cta:    0 8px 20px rgba(44, 28, 26, 0.14);
  --shadow-modal:  0 12px 32px rgba(44, 28, 26, 0.22);
  --shadow-reveal:
    0 0 0 12px rgba(212, 168, 90, 0.22),
    0 0 0 26px rgba(212, 168, 90, 0.12);

  /* ----- Motion ------------------------------------------- */
  --dur-instant:   80ms;
  --dur-quick:     150ms;
  --dur-standard:  220ms;
  --dur-gate:      420ms;
  --dur-reveal:    1600ms;

  --ease-standard:  cubic-bezier(.2, 0, 0, 1);
  --ease-emphasize: cubic-bezier(.16, 1, .3, 1);   /* gate, reveal entrance */
  --ease-out:       cubic-bezier(.33, 1, .68, 1);
}

/* ----- Utility classes for the kit & preview --------------- */
.font-sans      { font-family: var(--font-sans); }

.text-display   { font: var(--text-display-weight) var(--text-display-size)/var(--text-display-lh) var(--font-sans); }
.text-h1        { font: var(--text-h1-weight)      var(--text-h1-size)/var(--text-h1-lh)           var(--font-sans); }
.text-h2        { font: var(--text-h2-weight)      var(--text-h2-size)/var(--text-h2-lh)           var(--font-sans); }
.text-h3        { font: var(--text-h3-weight)      var(--text-h3-size)/var(--text-h3-lh)           var(--font-sans); }
.text-body      { font: var(--text-body-weight)    var(--text-body-size)/var(--text-body-lh)       var(--font-sans); }
.text-body-sm   { font: var(--text-body-sm-weight) var(--text-body-sm-size)/var(--text-body-sm-lh) var(--font-sans); }
.text-caption   { font: var(--text-caption-weight) var(--text-caption-size)/var(--text-caption-lh) var(--font-sans); letter-spacing: var(--tracking-button); }
.text-button    { font: var(--text-button-weight)  var(--text-button-size)/var(--text-button-lh)   var(--font-sans); letter-spacing: var(--tracking-button); }

@media (prefers-reduced-motion: reduce) {
  :root {
    --dur-gate:   200ms;
    --dur-reveal: 200ms;
  }
}

</style>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans)}
  .wrap{padding:32px 40px;max-width:760px}
  h1{margin:0 0 4px;font-size:22px;font-weight:900;letter-spacing:-0.01em}
  .sub{margin:0 0 28px;color:var(--text-secondary);font-size:13px;line-height:1.55;max-width:520px}
  .grid{display:grid;grid-template-columns:180px 1fr auto;gap:18px 24px;align-items:center;padding:16px 0;border-top:1px dashed var(--border)}
  .grid:first-of-type{border-top:none}
  .nm{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:700}
  .hint{font-size:11px;color:var(--text-secondary);line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <h1>Buttons</h1>
  <p class="sub">Clear hierarchy, never two primaries on one screen. Minimum touch target 46px. Label letter-spacing +0.04em.</p>
  <div id="mount"></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
// Button — hierarchy per spec.
// Primary · Secondary · Reveal (amber, ceremony only) · Destructive · Link
// Min touch target 44px · full radius · label tracking +0.04em

const buttonBase = {
  border: "none",
  borderRadius: "var(--radius-full)",
  minHeight: 46,
  padding: "0 18px",
  fontFamily: "var(--font-sans)",
  fontWeight: "var(--text-button-weight)",
  fontSize: "var(--text-button-size)",
  letterSpacing: "var(--tracking-button)",
  cursor: "pointer",
  display: "inline-flex",
  alignItems: "center",
  justifyContent: "center",
  gap: 8,
  transition: "transform var(--dur-quick) var(--ease-out), filter var(--dur-quick) var(--ease-out), background var(--dur-quick) var(--ease-out)",
  WebkitTapHighlightColor: "transparent",
};

const buttonVariants = {
  primary: {
    background: "var(--primary)",
    color: "var(--on-primary)",
    boxShadow: "var(--shadow-cta)",
  },
  secondary: {
    background: "var(--bg-surface)",
    color: "var(--text-primary)",
    border: "1px solid var(--border)",
  },
  reveal: {
    background: "var(--reveal)",
    color: "var(--on-reveal)",
    boxShadow: "var(--shadow-cta)",
  },
  destructive: {
    background: "var(--bg-surface)",
    color: "var(--error)",
    border: "1px solid var(--border)",
  },
  link: {
    background: "transparent",
    color: "var(--accent)",
    textDecoration: "underline",
    textUnderlineOffset: 3,
    minHeight: "auto",
    padding: "6px 0",
    boxShadow: "none",
  },
};

const Button = ({
  variant = "primary",
  children,
  onClick,
  icon,
  fullWidth = false,
  style,
  ...rest
}) => {
  const [pressed, setPressed] = React.useState(false);
  const vStyle = buttonVariants[variant] || buttonVariants.primary;
  return (
    <button
      onClick={onClick}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      style={{
        ...buttonBase,
        ...vStyle,
        width: fullWidth ? "100%" : undefined,
        transform: pressed ? "scale(0.985)" : "scale(1)",
        filter: pressed ? "brightness(0.97)" : "brightness(1)",
        ...style,
      }}
      {...rest}
    >
      {icon}
      <span>{children}</span>
    </button>
  );
};

window.Button = Button;


// --- page ---

const rows = [
  { label: "Primary",     body: <Button variant="primary">Enter conversation</Button>, hint: "Sole CTA. One per screen." },
  { label: "Secondary",   body: <Button variant="secondary">Not right now</Button>, hint: "Equal-weight pair with primary." },
  { label: "Reveal",      body: <Button variant="reveal">Reveal</Button>, hint: "Only at the gate & ceremony." },
  { label: "Destructive", body: <Button variant="destructive">End this conversation</Button>, hint: "Quiet, borderless red." },
  { label: "Link",        body: <Button variant="link">Take a break</Button>, hint: "Tertiary, low-gravity." },
];
const App = () => (
  <>
    {rows.map(r => (
      <div className="grid" key={r.label}>
        <span className="nm">{r.label}</span>
        <div>{r.body}</div>
        <span className="hint">{r.hint}</span>
      </div>
    ))}
  </>
);
ReactDOM.createRoot(document.getElementById("mount")).render(<App />);
</script>
</body>
</html>
