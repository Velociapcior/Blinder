# nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    upstream api_upstream {
        server api:8080;
    }

    upstream identityserver_upstream {
        server identityserver:8080;
    }

    server {
        listen 80;
        server_name _;

        # ── OAuth2/OIDC token endpoints → Blinder.IdentityServer ─────────────
        # Covers: POST /api/auth/oauth/token  (ROPC, refresh, auth code)
        #         POST /api/auth/oauth/revoke (token revocation)
        # Must be declared before the generic /api/ block (longest-prefix match wins).
        location /api/auth/oauth/ {
            proxy_pass             http://identityserver_upstream;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
        }

        # ── OIDC discovery → Blinder.IdentityServer ──────────────────────────
        # Blinder.Api fetches .well-known/openid-configuration to validate tokens.
        location /.well-known/ {
            proxy_pass             http://identityserver_upstream;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
        }

        # ── SignalR WebSockets → Blinder.Api ─────────────────────────────────
        # All four directives below are mandatory to keep SignalR on WebSockets.
        location /hubs/ {
            proxy_pass             http://api_upstream;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_read_timeout     3600s;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
        }

        # ── Admin → Blinder.Api (IP-allowlisted) ─────────────────────────────
        location /admin {
            # Keep admin IP rules in a separate file so operators can update allowlists safely.
            include /etc/nginx/conf.d/admin-allowlist.conf;

            proxy_pass             http://api_upstream;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
        }

        # ── All other requests → Blinder.Api ─────────────────────────────────
        location / {
            proxy_pass             http://api_upstream;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
        }
    }
}
