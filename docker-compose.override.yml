# docker-compose.override.yml  (repo root — committed to source control)
# Dev-only overrides: SDK stage, live source mount, hot-reload entrypoint.
# Production deployments use: docker compose -f docker-compose.yml up -d (ignores this file).

services:
  api:
    build:
      target: build          # Override: use the SDK stage so dotnet-ef CLI is available
    working_dir: /src/Blinder.Api
    command: ["dotnet", "run", "--no-launch-profile", "--project", "/src/Blinder.Api/Blinder.Api.csproj", "--urls", "http://0.0.0.0:8080"]
    volumes:
      - ./backend:/src       # Live source mount for EF CLI commands without rebuild
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:?POSTGRES_DB is required};Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  db:
    ports:
      - "5432:5432"   # Expose Postgres to host for local tooling (DBeaver, psql, etc.)
