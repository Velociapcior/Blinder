# docker-compose.override.yml  (repo root — committed to source control)
# Dev-only overrides: SDK stage, live source mount, hot-reload entrypoint.
# Production deployments use: docker compose -f docker-compose.yml up -d (ignores this file).

services:
  api:
    build:
      target: build          # Override: use the SDK stage so dotnet-ef CLI is available
    volumes:
      - ./backend:/src       # Live source mount for EF CLI commands without rebuild
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
